<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade log tool</title>
  <link rel="stylesheet" href="./styles_update_theme.css">
</head>
<body>
  <button class="theme-toggle" id="theme-toggle-btn" type="button" aria-label="切换明暗主题">黑 / 白</button>
  <div class="app app-update">
    <aside class="panel sidebar sidebar-update">
      <div class="panel-header">
        <h2 class="title">交易档案</h2>
        <p class="subtitle">左边切换记录，中间填写。这个版本先去掉右侧内容，只保留左栏和中间工作区。</p>
        <div class="sidebar-actions">
          <div class="sidebar-action-row">
            <div class="btn" id="save-holding-btn-clone">保存-持仓中</div>
            <div class="btn" id="save-completed-btn-clone">保存-已完成</div>
          </div>
          <div class="sidebar-action-row">
            <div class="btn" id="export-btn-clone">导出 JSON</div>
            <label class="btn file-btn">
              导入 JSON
              <input type="file" id="import-input-clone" accept=".json" hidden>
            </label>
          </div>
          <div class="sidebar-action-row sidebar-action-row-single">
            <div class="btn primary" id="new-trade-btn" role="button" tabindex="0">建立新交易</div>
          </div>
        </div>
        <div class="toolbar">
          <button class="tab filter-pill active" data-status="持仓中" type="button">持仓中</button>
          <button class="tab filter-pill" data-status="已完成" type="button">已完成</button>
        </div>
      </div>
      <div class="list" id="archive-list"></div>
    </aside>

    <main class="content content-update">
      <form id="trade-form">
        <section class="hero">
          <span id="hero-status-dot" style="display:none;"></span>
          <div class="hero-stats" id="hero-stats">
            <div class="holding-empty">当前还没有持仓中的交易。</div>
          </div>
        </section>

        <section class="card">
          <h3 class="card-title">基础交易信息</h3>
          <div class="fields">
            <div class="field">
              <label>交易品种</label>
              <input class="input" type="text" name="symbol" placeholder="如 BTCUSDT">
            </div>
            <div class="field">
              <label>开仓方向</label>
              <select class="input" name="tradeDirection">
                <option value="多">多</option>
                <option value="空">空</option>
              </select>
            </div>
            <div class="field">
              <label>盈亏比</label>
              <input class="input" type="text" name="rMultiple" readonly>
            </div>
            <div class="field">
              <label>开仓时间</label>
              <input class="input" type="datetime-local" name="entryTime">
            </div>
            <div class="field">
              <label>开仓点位</label>
              <input class="input" type="number" step="any" name="entryPrice">
            </div>
            <div class="field">
              <label>风险金额</label>
              <input class="input" type="number" step="any" name="riskAmount">
            </div>
            <div class="field">
              <label>平仓时间</label>
              <input class="input" type="datetime-local" name="exitTime">
            </div>
            <div class="field">
              <label>平仓点位</label>
              <input class="input" type="number" step="any" name="exitPrice">
            </div>
            <div class="field">
              <label>盈亏金额</label>
              <input class="input" type="number" step="any" name="pnlAmount">
            </div>
          </div>
        </section>

        <section class="card">
          <h3 class="card-title">市场与标的判断</h3>
          <div class="fields">
            <div class="field">
              <label>市场季节</label>
              <div class="choice-group" id="single-market-season"></div>
              <select name="marketSeason" hidden></select>
              <input class="input" type="text" name="marketSeasonNote" placeholder="补充：如 春末夏初">
            </div>
            <div class="field">
              <label>大盘状态</label>
              <div class="choice-group" id="single-market-state"></div>
              <select name="marketState" hidden></select>
              <input class="input" type="text" name="marketStateNote" placeholder="补充：如 高位震荡后再次上攻">
            </div>
            <div class="field">
              <label>市场热度</label>
              <div class="choice-group" id="single-market-heat"></div>
              <select name="marketHeat" hidden></select>
              <input class="input" type="text" name="marketHeatNote" placeholder="补充：如 热度开始集中到强势币">
            </div>
            <div class="field">
              <label>标的类型</label>
              <div class="choice-group" id="single-target-type"></div>
              <select name="targetType" hidden></select>
              <input class="input" type="text" name="targetTypeNote" placeholder="补充">
            </div>
            <div class="field field-tall span-2">
              <label>入场逻辑</label>
              <div class="choice-group" id="single-entry-logic"></div>
              <select name="entryLogic" hidden></select>
              <input class="input" type="text" name="entryLogicNote" placeholder="补充">
            </div>
          </div>
        </section>

        <section class="card">
          <h3 class="card-title">情绪、标签与评分</h3>
          <div class="fields emotion-fields">
            <div class="field span-2">
              <label>入场情绪</label>
              <div class="choice-group" id="entry-emotions"></div>
              <input class="input" type="text" name="entryEmotionsNote" placeholder="补充">
            </div>
            <div class="field span-2">
              <label>出场情绪</label>
              <div class="choice-group" id="exit-emotions"></div>
              <input class="input" type="text" name="exitEmotionsNote" placeholder="补充">
            </div>
            <div class="field span-3">
              <label>打标签</label>
              <div class="choice-group" id="trade-tags"></div>
              <input class="input" type="text" name="tagsNote" placeholder="补充标签">
            </div>
            <div class="field span-3">
              <label>评分</label>
              <div class="score-wrap">
                <input class="score-slider" type="range" name="score" min="1" max="10" value="8">
                <div class="score-value" id="score-display">8 / 10</div>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <h3 class="card-title">执行摘要</h3>
          <div class="field span-3" style="padding: 0; border: 0; background: none;">
            <textarea class="textarea" name="executionSummary" rows="1" placeholder="可自动生成后再手动修改"></textarea>
          </div>
          <div class="toolbar" style="margin-top: 12px;">
            <button class="btn" id="generate-summary-btn" type="button">自动生成摘要</button>
          </div>
        </section>

        <section class="card">
          <h3 class="card-title">复盘笔记</h3>
          <div class="field span-3" style="padding: 0; border: 0; background: none;">
            <textarea class="textarea large" name="reviewNotes" rows="1" placeholder="记录本单介绍、评价、问题和改进点"></textarea>
          </div>
        </section>

        <section class="card">
          <h3 class="card-title">K线截图</h3>
          <div class="toolbar" style="margin-bottom: 12px;">
            <label class="btn file-btn">
              添加截图
              <input type="file" id="image-input" accept="image/*" multiple hidden>
            </label>
          </div>
          <div class="shots local-shot-list" id="local-shot-list">
            <div class="shot">还没有截图</div>
          </div>
        </section>
      </form>

      <div id="info-grid" hidden></div>
      <div id="view-notes" hidden></div>
    </main>
  </div>

  <div class="summary-support" hidden aria-hidden="true">
    <div id="summary-status-badge"></div>
    <div id="summary-season"></div>
    <div id="summary-season-note"></div>
    <div id="summary-market-state"></div>
    <div id="summary-market-state-note"></div>
    <div id="summary-market-heat"></div>
    <div id="summary-market-heat-note"></div>
    <div id="summary-target-type"></div>
    <div id="summary-target-type-note"></div>
    <div id="summary-entry-logic"></div>
    <div id="summary-entry-logic-note"></div>
    <div id="view-summary"></div>
  </div>

  <div class="detail-modal" id="detail-modal">
    <div class="detail-backdrop" id="detail-backdrop"></div>
    <div class="detail-dialog">
      <div class="detail-head">
        <div>
          <h2 class="detail-title" id="modal-title">档案详情</h2>
          <p class="detail-subtitle" id="modal-subtitle">点击左侧档案后，这里会在首页上方显示一层半透详情页。</p>
        </div>
        <div class="btn" id="close-modal-btn">关闭</div>
      </div>

      <div class="detail-body">
        <div class="detail-gallery">
          <div class="detail-main-image" id="modal-gallery-main">
            <div class="detail-main-empty">这里显示当前档案的大图</div>
          </div>
          <div class="detail-thumbs" id="modal-gallery-thumbs"></div>
        </div>

        <div class="detail-info">
          <div id="modal-info-grid" hidden></div>
          <div class="detail-note-card">
            <h3 class="detail-note-title" id="modal-summary-title">执行摘要</h3>
            <div class="detail-note-text" id="modal-summary">这里显示当前档案的执行摘要。</div>
          </div>

          <div class="detail-note-card">
            <h3 class="detail-note-title" id="modal-notes-title">复盘笔记</h3>
            <div class="detail-note-text" id="modal-notes">这里显示当前档案的复盘笔记和文字内容。</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="fullscreen-modal" id="fullscreenModal">
    <div class="fullscreen-inner">
      <div class="btn fullscreen-close" id="fullscreenCloseBtn">关闭</div>
      <img id="fullscreenImage" alt="全屏主图">
    </div>
  </div>

  <template id="archive-item-template">
    <div class="trade-item" role="button" tabindex="0">
      <div class="row">
        <div class="archive-headline">
          <div class="symbol archive-symbol"></div>
          <div class="archive-inline-meta archive-time"></div>
          <div class="archive-inline-meta archive-rmultiple"></div>
        </div>
        <div class="archive-actions">
          <div class="direction archive-direction"></div>
          <button class="archive-delete-btn" type="button">删除</button>
        </div>
      </div>
      <div class="row">
        <div class="logic archive-logic"></div>
        <div class="badge archive-status"></div>
      </div>
      <div class="row">
        <div class="archive-score-line">
          <span class="archive-score-label">评分</span>
          <span class="archive-score"></span>
        </div>
        <div class="profit archive-pnl"></div>
      </div>
      <div class="row">
        <div class="logic archive-tags"></div>
      </div>
    </div>
  </template>

  <script src="./app.js"></script>
  <script src="./app_update_theme.js"></script>
</body>
</html>
